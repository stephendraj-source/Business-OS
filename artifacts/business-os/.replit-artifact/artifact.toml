kind = "web"
previewPath = "/"
title = "Nonprofit Operating System"
version = "1.0.0"
id = "artifacts/nonprofit-os"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25437

[services.development]
run = "pnpm --filter @workspace/nonprofit-os run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nonprofit-os", "run", "build" ]
publicDir = "artifacts/nonprofit-os/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25437"
BASE_PATH = "/"
