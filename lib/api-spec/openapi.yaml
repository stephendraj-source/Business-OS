openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Nonprofit Operating System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: processes
    description: Nonprofit process operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /processes:
    get:
      operationId: listProcesses
      tags: [processes]
      summary: List all processes
      responses:
        "200":
          description: List of processes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Process"

  /processes/{id}:
    get:
      operationId: getProcess
      tags: [processes]
      summary: Get a process by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Process found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Process"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    put:
      operationId: updateProcess
      tags: [processes]
      summary: Update a process
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProcessBody"
      responses:
        "200":
          description: Updated process
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Process"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      operationId: deleteProcess
      tags: [processes]
      summary: Delete a process
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /categories:
    get:
      operationId: listCategories
      tags: [processes]
      summary: List distinct categories
      responses:
        "200":
          description: List of category names
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Process:
      type: object
      properties:
        id:
          type: integer
        number:
          type: integer
        category:
          type: string
        processDescription:
          type: string
        processName:
          type: string
        aiAgent:
          type: string
        purpose:
          type: string
        inputs:
          type: string
        outputs:
          type: string
        humanInTheLoop:
          type: string
        kpi:
          type: string
        estimatedValueImpact:
          type: string
        industryBenchmark:
          type: string
        included:
          type: boolean
        target:
          type: string
        achievement:
          type: string
      required:
        - id
        - number
        - category
        - processDescription
        - processName
        - aiAgent
        - purpose
        - inputs
        - outputs
        - humanInTheLoop
        - kpi
        - estimatedValueImpact
        - industryBenchmark
        - included
        - target
        - achievement

    UpdateProcessBody:
      type: object
      properties:
        category:
          type: string
        processDescription:
          type: string
        processName:
          type: string
        aiAgent:
          type: string
        purpose:
          type: string
        inputs:
          type: string
        outputs:
          type: string
        humanInTheLoop:
          type: string
        kpi:
          type: string
        estimatedValueImpact:
          type: string
        industryBenchmark:
          type: string
        included:
          type: boolean
        target:
          type: string
        achievement:
          type: string

    DeleteResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
